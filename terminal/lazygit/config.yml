gui:
  language: "en"
  useHunkModeInStagingView: true
  theme:
    selectedLineBgColor:
      - "#444444"
os:
  edit: 'code --goto {{filename}}'
  editAtLine: 'code --goto {{filename}}:{{line}}'
  editAtLineAndWait: 'code --goto --wait {{filename}}:{{line}}'
  editInTerminal: false
  openDirInEditor: 'code {{dir}}'
customCommands:
  - key: "A"
    command: git commit --amend {{.Form.V}} --no-edit
    context: "files"
    description: "Amend commit"
    prompts:
      - type: "menu"
        title: "Need verify ?"
        key: "V"
        options:
          - value: " "
            name: "Verify"
          - value: --no-verify
            name: "Skip"
  - key: "F"
    context: remotes
    command: "git fetch --prune origin --verbose"
    description: "Fetch remote branches"
